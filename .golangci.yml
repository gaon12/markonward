version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - nilerr
    - nolintlint
    - revive
    - unconvert
    - wastedassign

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
