name: Scheduled fuzz and benchmarks

on:
  schedule:
    - cron: "17 18 * * 6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzBlockSyntax
          - FuzzDelimiterSyntax
          - FuzzLinkSyntax
          - FuzzTableSyntax
          - FuzzRendererSyntax
          - FuzzParseProfiles
          - FuzzParseRenderRoundTrip
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: true
      - name: Run focused fuzz target
        shell: bash
        run: |
          set -o pipefail
          go test ./parser -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 60s 2>&1 | tee fuzz-${{ matrix.target }}.txt
      - name: Store fuzz output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz-${{ matrix.target }}.txt
            parser/testdata/fuzz/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 30

  benchmark:
    name: Comparative benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.x
          cache: true
      - name: Measure ten samples
        shell: bash
        run: |
          mkdir -p benchmarks/results
          sh ./scripts/benchmark.sh benchmarks/results/current.txt 10
      - name: Format benchstat report
        shell: bash
        run: |
          go tool -C tools benchstat ../benchmarks/results/current.txt | tee benchmarks/results/benchstat.txt
      - name: Enforce comparative thresholds
        run: go run ./internal/benchgate -input benchmarks/results/current.txt
      - name: Store benchmark output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmarks-${{ github.run_id }}
          path: benchmarks/results/
          if-no-files-found: error
          retention-days: 90
