name: Scheduled fuzz and benchmarks

on:
  schedule:
    - cron: "17 18 * * 6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzBlockSyntax
          - FuzzDelimiterSyntax
          - FuzzLinkSyntax
          - FuzzTableSyntax
          - FuzzRendererSyntax
          - FuzzParseProfiles
          - FuzzParseRenderRoundTrip
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true
      - name: Run focused fuzz target
        shell: bash
        run: |
          set -o pipefail
          go test ./parser -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 60s 2>&1 | tee fuzz-${{ matrix.target }}.txt
      - name: Store fuzz output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-${{ matrix.target }}-${{ github.run_id }}
          path: fuzz-${{ matrix.target }}.txt
          if-no-files-found: warn
          retention-days: 30

  benchmark:
    name: Comparative benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true
      - name: Measure ten samples
        shell: bash
        run: |
          mkdir -p benchmarks/results
          go test -C benchmarks -run '^$' -bench 'Benchmark(Parse|ParseHTML)$' -benchmem -count 10 ./... | tee benchmarks/results/current.txt
      - name: Format benchstat report
        shell: bash
        run: |
          go tool -modfile=tools/go.mod benchstat benchmarks/results/current.txt | tee benchmarks/results/benchstat.txt
      - name: Enforce comparative thresholds
        run: go run ./internal/benchgate -input benchmarks/results/current.txt
      - name: Store benchmark output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmarks-${{ github.run_id }}
          path: benchmarks/results/
          if-no-files-found: error
          retention-days: 90
