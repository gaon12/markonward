name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-gates:
    name: Specification and performance gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true
      - name: Require an annotated tag
        shell: bash
        run: test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
      - name: Run all ordinary checks
        run: sh ./scripts/check.sh
      - name: Require complete official conformance
        env:
          MARKONWARD_STRICT_SPECS: "1"
        run: go test -count=1 -run 'TestOfficial' ./parser
      - name: Run comparative performance gate
        shell: bash
        run: |
          mkdir -p benchmarks/results
          go test -C benchmarks -run '^$' -bench 'Benchmark(Parse|ParseHTML)$' -benchmem -count 10 ./... | tee benchmarks/results/release.txt
          go run ./internal/benchgate -input benchmarks/results/release.txt

  publish:
    name: Build and publish release assets
    needs: release-gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.x
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
